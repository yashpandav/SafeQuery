apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "safequery.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "safequery.selectorLabels" (dict "component" "api" "Release" .Release) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
