apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "safequery.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "safequery.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "safequery.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      securityContext:
        {{- include "safequery.podSecurityContext" . | nindent 8 }}
      containers:
        - name: web
          image: {{ include "safequery.image" (dict "Values" .Values "app" .Values.web) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "safequery.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.web.service.port | quote }}
            # Reached by the user's browser — must be the public-facing API URL, not the cluster-internal one.
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.web.apiUrl | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          # Next.js standalone writes compiled page cache to /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
