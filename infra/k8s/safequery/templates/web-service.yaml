apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    {{- include "safequery.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "safequery.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
