apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai-service
  labels:
    {{- include "safequery.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-service
spec:
  replicas: {{ .Values.aiService.replicaCount }}
  selector:
    matchLabels:
      {{- include "safequery.selectorLabels" (dict "component" "ai-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "safequery.selectorLabels" (dict "component" "ai-service" "Release" .Release) | nindent 8 }}
        app.kubernetes.io/component: ai-service
    spec:
      securityContext:
        {{- include "safequery.podSecurityContext" . | nindent 8 }}
      containers:
        - name: ai-service
          image: {{ include "safequery.image" (dict "Values" .Values "app" .Values.aiService) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            {{- include "safequery.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.aiService.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.aiService.service.port | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.aiService.corsOrigin | quote }}
            - name: AI_MODEL
              value: {{ .Values.aiService.aiModel | quote }}
            - name: AI_SCREEN_MODEL
              value: {{ .Values.aiService.aiScreenModel | quote }}
            - name: SERVICE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: SERVICE_PUBLIC_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: OPENAI_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.aiService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
