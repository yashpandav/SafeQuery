apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "safequery.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.external.databaseUrl | quote }}
  REDIS_URL: {{ .Values.external.redisUrl | quote }}
  PASETO_LOCAL_KEY: {{ .Values.secrets.pasetoLocalKey | quote }}
  SERVICE_PRIVATE_KEY: {{ .Values.secrets.servicePrivateKey | quote }}
  SERVICE_PUBLIC_KEY: {{ .Values.secrets.servicePublicKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  # CREDENTIAL_MASTER_KEY is consumed only by tre-dispatcher (which runs tre-executor in-process).
  # It must never appear in the api, ai-service, or web pods.
  CREDENTIAL_MASTER_KEY: {{ .Values.secrets.credentialMasterKey | quote }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | quote }}
