---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "audit_log"
  importDerivedRoles:
    - common_roles
    - audit_roles

  rules:
    # ── Admins and owners can read all audit logs and run integrity checks ──
    - actions: ["read", "verify_integrity"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_admin"]

    # ── Reviewers can read audit logs for governance oversight ──
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_approver"]

    # ── Users can read their own audit log entries (transparency) ──
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["log_actor"]

    # ── Audit logs are append-only — nobody can delete or modify entries ──
    - actions: ["delete", "update"]
      effect: EFFECT_DENY
      roles: ["*"]
