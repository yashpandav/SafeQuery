---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "audit_log"

  derivedRoles:
    name: audit_derived
    definitions:
      - name: same_org_member
        parentRoles: ["owner", "admin", "reviewer", "analyst", "viewer"]
        condition:
          match:
            expr: request.resource.attr.org_id == request.principal.attr.org_id

      - name: log_actor
        parentRoles: ["analyst", "admin", "owner", "reviewer"]
        condition:
          match:
            expr: >
              request.resource.attr.org_id == request.principal.attr.org_id &&
              request.resource.attr.actor_id == request.principal.id

  rules:
    # Admins and owners can read all audit logs and verify hash-chain integrity
    - actions: ["read", "verify_integrity"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_member"]
      roles: ["admin", "owner"]

    # Reviewers can read audit logs (needed for governance oversight)
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_member"]
      roles: ["reviewer"]

    # Users can read their own audit log entries (transparency)
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["log_actor"]

    # Audit logs are append-only — nobody can delete or modify them
    - actions: ["delete", "update"]
      effect: EFFECT_DENY
      roles: ["*"]
