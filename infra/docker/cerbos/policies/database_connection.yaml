---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "database_connection"
  importDerivedRoles:
    - common_roles

  rules:
    # ── Only admins and owners can create, update, or delete connections ──
    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_admin"]

    # ── Admins and owners can test connectivity and view full connection details ──
    - actions: ["read", "test_connection"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_admin"]

    # ── All org members can read connection metadata (name, env) ──
    - actions: ["read_metadata"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_member"]

    # ── Raw credentials must never leave the TRE — deny non-admin roles explicitly ──
    - actions: ["read_credentials"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_admin"]

    - actions: ["read_credentials"]
      effect: EFFECT_DENY
      roles: ["reviewer", "analyst", "viewer"]
