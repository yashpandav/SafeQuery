---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "policy"
  importDerivedRoles:
    - common_roles

  rules:
    # ── Org-tunable knobs (rate limits today, PII/time policies could follow the same shape later)
    #    are an admin-only concern, matching custom_role.yaml/environment.yaml/dashboard.yaml ──
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_admin"]
