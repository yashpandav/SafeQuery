---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "approval_request"
  importDerivedRoles:
    - common_roles
    - approval_roles

  rules:
    # ── Reviewers, admins, and owners can approve or reject pending requests ──
    - actions: ["approve", "reject"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_approver"]
      condition:
        match:
          expr: request.resource.attr.status == "PENDING"

    # ── Reviewers, admins, and owners can view all requests in their org ──
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_approver"]

    # ── Analysts can only view requests they submitted ──
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["request_submitter"]

    # ── Nobody can approve or reject their own request (four-eyes principle) ──
    - actions: ["approve", "reject"]
      effect: EFFECT_DENY
      roles: ["*"]
      condition:
        match:
          expr: request.resource.attr.submitted_by == request.principal.id
