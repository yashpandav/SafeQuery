---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "query"
  importDerivedRoles:
    - common_roles
    - query_roles

  rules:
    # ── Submit a natural-language query (generates SQL, does not execute yet) ──
    - actions: ["submit"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_submitter"]

    # ── View query results (masked PII already applied by TRE) ──
    - actions: ["read_results"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_member"]

    # ── Approve or reject a CRITICAL query ──
    - actions: ["approve", "reject"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_org_approver"]
      condition:
        match:
          expr: request.resource.attr.risk_level == "CRITICAL"

    # ── SECURITY_INCIDENT queries are hard-rejected — no approval path ──
    - actions: ["approve"]
      effect: EFFECT_DENY
      roles: ["*"]
      condition:
        match:
          expr: request.resource.attr.risk_level == "SECURITY_INCIDENT"

    # ── Production environment writes require explicit approval flow ──
    # Analysts cannot bypass this regardless of risk level.
    # Reviewers/admins/owners can execute writes after approval.
    - actions: ["execute_write"]
      effect: EFFECT_DENY
      roles: ["analyst"]
      condition:
        match:
          expr: request.resource.attr.environment == "production"
